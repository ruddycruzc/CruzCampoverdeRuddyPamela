<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - F5Flix</title>

   
    <link rel="stylesheet" href="m4play.css">

    <link rel="icon" type="image/png" href="src/images/logo.png">
</head>

<body>

   
    <header class="header">
        <nav class="navbar" aria-label="Navegación principal">

    
            <a href="index.html" class="logo">
                <img src="src/images/F5-Logo.png" alt="F5Flix logo">
            </a>
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">PELÍCULAS</a></li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">SERIES</a></li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">LO MÁS VISTO</a></li>
                <li class="nav-item">
                    <a href="registro.html" class="nav-link">DATE DE ALTA</a></li>
                <li class="nav-item">
                    <a href="contacto.html" class="nav-link">CONTACTO</a></li>
            </ul>

            <div class="user-actions">
                <a href="login.html">
                    <img src="src/images/user-regular.svg" alt="Iniciar sesión">
                </a>
            </div>

        </nav>
    </header>

  
    <main>

        <section class="contacto">

            <h1>Contacto</h1>

            <p class="contacto-texto">
                ¿Tienes alguna duda o sugerencia? Escríbenos y te responderemos lo antes posible.
            </p>

            <form action="#" method="GET" class="formulario">

         
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

              
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

            
                <div class="form-group">
                    <label for="motivo">Motivo</label>
                    <select id="motivo" name="motivo">
                        <option value="">Selecciona</option>
                        <option value="soporte">Soporte técnico</option>
                        <option value="sugerencia">Sugerencia</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                
                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>

               
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="newsletter">
                        Quiero recibir novedades
                    </label>
                </div>

             
                <button type="submit" class="btn">Enviar mensaje</button>

            </form>

        </section>

    </main>

   
    <footer>
        <p>© 2026 F5Flix by Ruddy Pamela Cruz Campoverde</p>
    </footer>

</body>

</html>
